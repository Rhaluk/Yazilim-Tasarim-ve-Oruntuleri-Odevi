<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basit Şifreleme Aracı</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; }
        input, textarea, select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .buttons { display: flex; gap: 10px; margin-top: 1rem; }
        button { flex: 1; padding: 0.75rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .encrypt-btn { background-color: #007bff; color: white; }
        .decrypt-btn { background-color: #28a745; color: white; }
        button:hover { opacity: 0.9; }
        .result-group { margin-top: 1.5rem; }
        #result { background-color: #e9ecef; padding: 1rem; border-radius: 4px; min-height: 1.2em; word-break: break-all; }
    </style>
</head>
<body>
<div class="container">
    <h2>Şifreleme Aracı</h2>
    <div class="form-group">
        <label for="algorithm">Şifreleme Tipi:</label>
        <select id="algorithm">
            <option value="aes">AES</option>
            <option value="rsa">RSA</option>
            <option value="base64">Base64</option>
        </select>
    </div>
    <div class="form-group">
        <label for="message">Mesaj:</label>
        <textarea id="message" rows="3" placeholder="Mesajınızı buraya yazın..."></textarea>
    </div>
    <div class="buttons">
        <button id="encryptBtn" class="encrypt-btn">Şifrele</button>
        <button id="decryptBtn" class="decrypt-btn">Şifre Çöz</button>
    </div>
    <div class="result-group">
        <label>Sonuç:</label>
        <div id="result"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
<script src="index.js"></script>
</body>
</html>
